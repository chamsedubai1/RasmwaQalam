<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="400" height="400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bg-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.9" />
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0.9" />
    </linearGradient>
    
    <!-- Digital art brush pattern -->
    <pattern id="art-pattern" width="100" height="100" patternUnits="userSpaceOnUse">
      <circle cx="50" cy="50" r="40" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="1" />
      <circle cx="50" cy="50" r="30" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="1" />
      <circle cx="50" cy="50" r="20" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="1" />
      <circle cx="50" cy="50" r="10" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="1" />
    </pattern>
    
    <!-- Neural network pattern -->
    <pattern id="neural-pattern" width="80" height="80" patternUnits="userSpaceOnUse">
      <circle cx="10" cy="10" r="3" fill="rgba(255,255,255,0.4)" />
      <circle cx="30" cy="20" r="2" fill="rgba(255,255,255,0.3)" />
      <circle cx="50" cy="15" r="3" fill="rgba(255,255,255,0.4)" />
      <circle cx="70" cy="25" r="2" fill="rgba(255,255,255,0.3)" />
      <circle cx="20" cy="40" r="3" fill="rgba(255,255,255,0.4)" />
      <circle cx="40" cy="50" r="2" fill="rgba(255,255,255,0.3)" />
      <circle cx="60" cy="45" r="3" fill="rgba(255,255,255,0.4)" />
      <circle cx="15" cy="65" r="2" fill="rgba(255,255,255,0.3)" />
      <circle cx="35" cy="70" r="3" fill="rgba(255,255,255,0.4)" />
      <circle cx="55" cy="75" r="2" fill="rgba(255,255,255,0.3)" />
      <line x1="10" y1="10" x2="30" y2="20" stroke="rgba(255,255,255,0.2)" stroke-width="1" />
      <line x1="30" y1="20" x2="50" y2="15" stroke="rgba(255,255,255,0.2)" stroke-width="1" />
      <line x1="50" y1="15" x2="70" y2="25" stroke="rgba(255,255,255,0.2)" stroke-width="1" />
      <line x1="20" y1="40" x2="40" y2="50" stroke="rgba(255,255,255,0.2)" stroke-width="1" />
      <line x1="40" y1="50" x2="60" y2="45" stroke="rgba(255,255,255,0.2)" stroke-width="1" />
      <line x1="15" y1="65" x2="35" y2="70" stroke="rgba(255,255,255,0.2)" stroke-width="1" />
      <line x1="35" y1="70" x2="55" y2="75" stroke="rgba(255,255,255,0.2)" stroke-width="1" />
      <line x1="10" y1="10" x2="20" y2="40" stroke="rgba(255,255,255,0.2)" stroke-width="1" />
      <line x1="30" y1="20" x2="40" y2="50" stroke="rgba(255,255,255,0.2)" stroke-width="1" />
      <line x1="50" y1="15" x2="60" y2="45" stroke="rgba(255,255,255,0.2)" stroke-width="1" />
      <line x1="70" y1="25" x2="55" y2="75" stroke="rgba(255,255,255,0.2)" stroke-width="1" />
    </pattern>
  </defs>
  
  <!-- Main background -->
  <rect width="400" height="400" fill="url(#bg-gradient)" />
  <rect width="400" height="400" fill="url(#neural-pattern)" opacity="0.3" />
  
  <!-- Art canvas with creative elements -->
  <rect x="50" y="50" width="300" height="300" rx="15" ry="15" fill="#ffffff" opacity="0.15" />
  <rect x="50" y="50" width="300" height="300" rx="15" ry="15" fill="url(#art-pattern)" opacity="0.6" />
  
  <!-- Abstract students representation -->
  <circle cx="130" cy="150" r="25" fill="#FFD700" opacity="0.8" /> <!-- Student 1 -->
  <circle cx="200" cy="120" r="20" fill="#FF6347" opacity="0.8" /> <!-- Student 2 -->
  <circle cx="270" cy="160" r="22" fill="#4169E1" opacity="0.8" /> <!-- Student 3 -->
  
  <!-- Digital art tools representations -->
  <rect x="100" y="200" width="60" height="40" rx="5" ry="5" fill="#ffffff" opacity="0.7" /> <!-- Digital canvas 1 -->
  <rect x="180" y="220" width="70" height="50" rx="5" ry="5" fill="#ffffff" opacity="0.7" /> <!-- Digital canvas 2 -->
  <rect x="270" y="210" width="50" height="35" rx="5" ry="5" fill="#ffffff" opacity="0.7" /> <!-- Digital canvas 3 -->
  
  <!-- Creative elements floating between students and canvases -->
  <circle cx="150" cy="180" r="8" fill="#9370DB" opacity="0.9" /> <!-- Creative element 1 -->
  <circle cx="220" cy="190" r="10" fill="#32CD32" opacity="0.9" /> <!-- Creative element 2 -->
  <circle cx="250" cy="170" r="7" fill="#FF69B4" opacity="0.9" /> <!-- Creative element 3 -->
  
  <!-- Lines connecting students to canvases (collaboration) -->
  <line x1="130" y1="150" x2="120" y2="200" stroke="#ffffff" stroke-width="2" opacity="0.6" />
  <line x1="200" y1="120" x2="210" y2="220" stroke="#ffffff" stroke-width="2" opacity="0.6" />
  <line x1="270" y1="160" x2="280" y2="210" stroke="#ffffff" stroke-width="2" opacity="0.6" />
  <line x1="130" y1="150" x2="210" y2="220" stroke="#ffffff" stroke-width="1" opacity="0.4" />
  <line x1="200" y1="120" x2="280" y2="210" stroke="#ffffff" stroke-width="1" opacity="0.4" />
  
  <!-- Text elements with title -->
  <text x="200" y="320" font-family="Arial, sans-serif" font-size="18" fill="white" text-anchor="middle" font-weight="bold">AI-Powered Creativity</text>
  <text x="200" y="345" font-family="Arial, sans-serif" font-size="14" fill="white" text-anchor="middle">Empowering Students through Art & Technology</text>
</svg>