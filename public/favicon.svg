<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Logo Background -->
  <defs>
    <linearGradient id="gradient1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stopColor="#0c4a6e" />
      <stop offset="100%" stopColor="#0369a1" />
    </linearGradient>
    <linearGradient id="gradient2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stopColor="#f97316" />
      <stop offset="100%" stopColor="#fcd34d" />
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <!-- Main shape -->
  <rect x="50" y="50" width="412" height="412" rx="40" fill="url(#gradient1)" />
  
  <!-- Artistic Elements - Abstract F for favicon -->
  <g filter="url(#glow)">
    <!-- Horizontal lines of 'F' -->
    <rect x="120" y="150" width="280" height="50" rx="25" fill="url(#gradient2)" />
    <rect x="120" y="250" width="200" height="50" rx="25" fill="url(#gradient2)" />
    
    <!-- Vertical line of 'F' -->
    <rect x="120" y="150" width="50" height="220" rx="25" fill="url(#gradient2)" />
    
    <!-- Abstract artistic elements -->
    <circle cx="380" cy="350" r="60" fill="#ec4899" opacity="0.9" />
    <circle cx="320" cy="290" r="40" fill="#8b5cf6" opacity="0.9" />
  </g>
  
  <!-- ART Text for favicon -->
  <text
    x="400"
    y="140"
    fontSize="70"
    fontWeight="bold"
    textAnchor="middle"
    fill="white"
    style="font-family: Arial, sans-serif"
    stroke="#0c4a6e"
    strokeWidth="2"
  >
    ART
  </text>
</svg>